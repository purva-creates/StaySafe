<!DOCTYPE html>
<html>
<head>
  <title>StaySafe Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #eef2f3, #dfe9f3);
      text-align: center;
    }

    h1 { color: #333; }

    .btn {
      padding: 15px 25px;
      margin: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .fire { background: #e74c3c; color: white; }
    .medical { background: #3498db; color: white; }
    .security { background: #f1c40f; color: black; }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: left;
    }

    .small-btn {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #2c3e50;
      color: white;
    }

    input, select, textarea {
      padding: 10px;
      width: 260px;
      margin-top: 10px;
    }

    textarea { height: 60px; }

    #msgBar {
      margin-top: 10px;
      font-weight: bold;
    }

    .msg-normal { color: #2c3e50; }
    .msg-error { color: #e74c3c; }
  </style>
</head>

<body>

<h1>StaySafe Dashboard</h1>

<button class="small-btn" onclick="toggleStaff()">Toggle Staff Mode</button>

<div id="msgBar" class="msg-normal"></div>

<div id="home">
  <input id="location" placeholder="Enter Location"><br>

  <select id="priority">
    <option value="HIGH">High</option>
    <option value="MEDIUM">Medium</option>
    <option value="LOW">Low</option>
  </select><br>

  <textarea id="message" placeholder="Add extra message"></textarea><br><br>

  <button class="btn fire" onclick="handleEmergency('Fire')">Fire</button>
  <button class="btn medical" onclick="handleEmergency('Medical')">Medical</button>
  <button class="btn security" onclick="handleEmergency('Security')">Security</button>
</div>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, onSnapshot, doc, updateDoc, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isStaff = false;
let dataCache = [];

function showMsg(text, isError=false){
  const bar = document.getElementById("msgBar");
  bar.innerText = text;
  bar.className = isError ? "msg-error" : "msg-normal";

  setTimeout(()=>{ bar.innerText=""; },3000);
}

/* ✅ FIX HERE */
window.toggleStaff = function(){
  isStaff = !isStaff;
  showMsg("Staff Mode: " + (isStaff ? "ON" : "OFF"));
  render(); // 🔥 IMPORTANT FIX
};

function getTimeAgo(time){
  let diff = (Date.now() - new Date(time)) / 1000;
  if(diff<60) return "Just now";
  if(diff<3600) return Math.floor(diff/60)+" min ago";
  return Math.floor(diff/3600)+" hr ago";
}

function getHelp(type){
  if(type==="Fire") return "Fire extinguisher near exit";
  if(type==="Medical") return "First aid at reception";
  return "Contact security";
}

function getCoordination(status){
  if(status==="ongoing") return "Management informed → Staff responding";
  if(status==="under control") return "Situation under control → Monitoring";
  if(status==="resolved") return "Issue resolved";
}

function getSteps(type){
  if(type==="Fire") return ["Evacuate","Use extinguisher","Call fire service"];
  if(type==="Medical") return ["Call doctor","Give first aid","Stay nearby"];
  return ["Alert security","Ensure safety","Control area"];
}

function getStatusColor(status){
  if(status==="ongoing") return "red";
  if(status==="under control") return "orange";
  if(status==="resolved") return "green";
  return "black";
}

const q = query(collection(db,"emergencies"), orderBy("time","desc"));

onSnapshot(q,(snap)=>{
  dataCache=[];
  snap.forEach(d=>{
    dataCache.push({id:d.id,...d.data()});
  });
  render();
});

function render(){
  document.getElementById("list").innerHTML="<h3 style='color:red'>Live Emergencies</h3>";

  dataCache.forEach(d=>{
    document.getElementById("list").innerHTML+=`
    <div class="box">
      <b>${d.type}</b><br>
      Location: ${d.location}<br>
      Priority: ${d.priority}<br>
      Reports: ${d.reports || 1}<br>
      Time: ${getTimeAgo(d.time)}<br>

      <b>Status:</b> <span style="color:${getStatusColor(d.status)}">${d.status}</span><br>
      <b>Coordination:</b> ${getCoordination(d.status)}<br>

      <b>Suggested Actions:</b>
      <ul>${getSteps(d.type).map(s=>`<li>${s}</li>`).join("")}</ul>

      <b>Help:</b> ${getHelp(d.type)}<br>

      ${d.message ? `<b style="color:red;">Message:</b> <span style="color:red;">${d.message}</span><br>` : ""}

      ${!isStaff ? `<button onclick="agree('${d.id}',${d.reports||1})">Confirm</button>` : ""}

      ${isStaff ? `
        <button onclick="updateStatus('${d.id}','ongoing')">Ongoing</button>
        <button onclick="updateStatus('${d.id}','under control')">Under Control</button>
        <button onclick="updateStatus('${d.id}','resolved')">Resolved</button>
      ` : ""}
    </div>`;
  });
}

window.agree = async function(id,count){
  await updateDoc(doc(db,"emergencies",id),{
    reports: count+1
  });
};

window.updateStatus = async function(id,status){
  await updateDoc(doc(db,"emergencies",id),{
    status: status
  });
};

window.handleEmergency = async function(type){

  let location=document.getElementById("location").value;
  let priority=document.getElementById("priority").value;
  let message=document.getElementById("message").value;

  let exists = dataCache.find(d=>d.type===type && d.location===location && d.status!=="resolved");

  if(exists){
    showMsg("Already reported. You can confirm it.", true);
    return;
  }

  showMsg("Alert received by management.");

  await addDoc(collection(db,"emergencies"),{
    type,
    location,
    priority,
    message,
    status:"ongoing",
    reports:1,
    time:new Date().toISOString()
  });

  document.getElementById("message").value="";
};
</script>

</body>
</html>
