<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StaySafe — Crisis Response</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --border: #ddd8d0; --text: #1a1a1a;
      --muted: #6b6860; --fire: #c0392b; --fire-bg: #fdf0ee;
      --medical: #1a6fb0; --medical-bg: #eef4fb;
      --security: #b58a00; --security-bg: #fdf8e8;
      --ongoing: #c0392b; --controlled: #d07000;
      --resolved: #2d7a4f; --accent: #2c3e50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--accent); color: white; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-logo { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 16px; }
    .topbar-logo span { color: #e74c3c; }
    .mode-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.12); color: #ccc; }
    .mode-pill.active { background: #e74c3c; color: white; }
    .toggle-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 14px; border-radius: 5px; cursor: pointer; }
    .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
    .two-col { display: grid; grid-template-columns: 360px 1fr; gap: 20px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); display: flex; justify-content: space-between; }
    .panel-body { padding: 18px; }
    .form-field { margin-bottom: 14px; }
    .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); }
    .sos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .sos-btn { padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; color: white; display: flex; flex-direction: column; align-items: center; }
    .sos-btn.fire { background: var(--fire); }
    .sos-btn.medical { background: var(--medical); }
    .sos-btn.security { background: #7f6000; }
    .alert-card { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; background: white; overflow: hidden; }
    .alert-card-header { padding: 10px 14px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .alert-card-header.fire { background: var(--fire-bg); border-left: 4px solid var(--fire); }
    .alert-card-header.medical { background: var(--medical-bg); border-left: 4px solid var(--medical); }
    .alert-card-header.security { background: var(--security-bg); border-left: 4px solid var(--security); }
    .status-badge { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    .status-ongoing { background: #fde8e8; color: var(--ongoing); }
    .status-resolved { background: #e6f4ec; color: var(--resolved); }
    #statusBar { padding: 10px; margin-bottom: 10px; border-radius: 4px; display: none; font-size: 13px; }
    #statusBar.info { display: block; background: #eef4fb; color: #1a6fb0; border-left: 4px solid #1a6fb0; }
    .instruction-banner { background: #fffde7; border: 1px solid #fbc02d; padding: 10px; border-radius: 4px; margin-top: 10px; font-weight: 600; color: #856404; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">Stay<span>Safe</span></div>
  </div>
  <div class="topbar-right">
    <div class="mode-pill" id="modePill">Guest Mode</div>
    <button class="toggle-btn" onclick="toggleStaff()">Switch Mode</button>
  </div>
</div>

<div class="container">
  <div class="two-col">
    <div>
      <div class="panel">
        <div class="panel-header">Report Emergency</div>
        <div class="panel-body">
          <div class="form-field">
            <label class="form-label">Location (Floor & Room)</label>
            <input class="form-input" id="location" placeholder="e.g. Room 204">
          </div>
          <div class="form-field">
            <label class="form-label">Priority</label>
            <select class="form-select" id="priority">
              <option value="HIGH">High</option>
              <option value="MEDIUM">Medium</option>
              <option value="LOW">Low</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Evidence Photo</label>
            <input type="file" id="photoUpload" accept="image/*" capture="environment" class="form-input">
          </div>
          <div id="statusBar"></div>
          <div class="sos-grid">
            <button class="sos-btn fire" onclick="handleEmergency('Fire')">🔥 Fire</button>
            <button class="sos-btn medical" onclick="handleEmergency('Medical')">🚑 Medical</button>
            <button class="sos-btn security" onclick="handleEmergency('Security')">🛡️ Security</button>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="panel">
        <div class="panel-header">Live Alerts <span id="alertCount" style="background:red; color:white; padding:2px 6px; border-radius:10px;">0</span></div>
        <div class="panel-body" id="alertList"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, addDoc, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBFqSj13pDUioDbRj-cfUPQg-YnSrn5bPw",
    authDomain: "staysafe-17243.firebaseapp.com",
    projectId: "staysafe-17243",
    storageBucket: "staysafe-17243.firebasestorage.app",
    messagingSenderId: "549075698004",
    appId: "1:549075698004:web:d86790f1dcf1d744ea08c1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let isStaff = false;
  let dataCache = [];

  window.toggleStaff = () => {
    isStaff = !isStaff;
    document.getElementById("modePill").textContent = isStaff ? "Staff Mode" : "Guest Mode";
    document.getElementById("modePill").classList.toggle("active", isStaff);
    render();
  };

  window.handleEmergency = async (type) => {
    const loc = document.getElementById("location").value;
    if (!loc) return alert("Please enter location");

    document.getElementById("statusBar").style.display = "block";
    document.getElementById("statusBar").innerHTML = "Sending alert...";

    let photoURL = null;
    const file = document.getElementById("photoUpload").files[0];
    
    if (file) {
      const sRef = ref(storage, `photos/${Date.now()}`);
      await uploadBytes(sRef, file);
      photoURL = await getDownloadURL(sRef);
    }

    await addDoc(collection(db, "emergencies"), {
      type, location: loc, status: "ongoing", 
      priority: document.getElementById("priority").value,
      time: new Date().toISOString(),
      photoURL, staffInstruction: ""
    });

    document.getElementById("statusBar").innerHTML = "✓ Sent Successfully";
    setTimeout(() => { document.getElementById("statusBar").style.display = "none"; }, 3000);
  };

  window.updateStatus = async (id, status) => {
    await updateDoc(doc(db, "emergencies", id), { status });
  };

  window.sendInstruction = async (id) => {
    const val = document.getElementById(`ins_${id}`).value;
    await updateDoc(doc(db, "emergencies", id), { staffInstruction: val });
    alert("Instruction sent to guest.");
  };

  onSnapshot(query(collection(db, "emergencies"), orderBy("time", "desc")), snap => {
    dataCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById("alertCount").textContent = dataCache.filter(x => x.status !== 'resolved').length;
    render();
  });

  function render() {
    const list = document.getElementById("alertList");
    if (dataCache.length === 0) {
      list.innerHTML = "<p>No active alerts.</p>";
      return;
    }

    list.innerHTML = dataCache.map(d => `
      <div class="alert-card">
        <div class="alert-card-header ${d.type.toLowerCase()}">
          <strong>${d.type.toUpperCase()}</strong>
          <span class="status-badge status-${d.status}">${d.status}</span>
        </div>
        <div class="panel-body">
          <p>📍 ${d.location} | ⚠️ ${d.priority}</p>
          ${d.photoURL ? `<img src="${d.photoURL}" style="width:100%; border-radius:4px; margin-top:10px;">` : ""}
          
          ${d.staffInstruction ? `<div class="instruction-banner">📢 STAFF: ${d.staffInstruction}</div>` : ""}

          ${isStaff && d.status !== 'resolved' ? `
            <div style="margin-top:10px; border-top:1px solid #eee; pt:10px;">
              <input type="text" id="ins_${d.id}" placeholder="Type instruction..." class="form-input" style="margin-bottom:5px;">
              <button onclick="sendInstruction('${d.id}')" class="toggle-btn" style="width:100%; background:var(--accent);">Send Broadcast</button>
              <button onclick="updateStatus('${d.id}', 'resolved')" class="toggle-btn" style="width:100%; margin-top:5px; background:var(--resolved);">Mark Resolved</button>
            </div>
          ` : ""}
        </div>
      </div>
    `).join("");
  }
</script>
</body>
</html>
