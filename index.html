<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StaySafe - Crisis Response</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

.topbar {
  background: #2c3e50;
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.panel {
  background: white;
  padding: 10px;
  border-radius: 8px;
}

button {
  margin: 5px;
  padding: 8px;
  cursor: pointer;
}

.alert {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 10px;
}

.fire { color: red; }
.medical { color: blue; }
.security { color: orange; }

canvas {
  width: 100%;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="topbar">
  <div>StaySafe</div>
  <div id="mode">Guest Mode</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="panel">
  <h3>Report Emergency</h3>

  <input id="location" placeholder="Location"><br><br>

  <select id="priority">
    <option>HIGH</option>
    <option>MEDIUM</option>
    <option>LOW</option>
  </select><br><br>

  <textarea id="message" placeholder="Message"></textarea><br><br>

  <button onclick="send('Fire')">🔥 Fire</button>
  <button onclick="send('Medical')">🚑 Medical</button>
  <button onclick="send('Security')">🛡 Security</button>

  <div id="ai"></div>
</div>

<!-- RIGHT -->
<div class="panel">
  <h3>Live Alerts</h3>
  <div id="alerts"></div>

  <h3>Floor Map</h3>
  <canvas id="map" width="300" height="200"></canvas>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  addDoc,
  collection,
  onSnapshot,
  query,
  orderBy,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 ADD YOUR KEYS HERE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const GEMINI_API_KEY = "YOUR_GEMINI_KEY";

/* INIT */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];

/* GEMINI */
async function gemini(prompt) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }]
      })
    }
  );

  const json = await res.json();
  return json.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

/* SEND ALERT */
window.send = async function(type) {
  const location = document.getElementById("location").value;
  const message = document.getElementById("message").value;
  const priority = document.getElementById("priority").value;

  const ref = await addDoc(collection(db,"alerts"), {
    type,
    location,
    message,
    priority,
    status:"ongoing",
    time:Date.now(),
    x:Math.random()*250,
    y:Math.random()*150
  });

  const ai = await gemini(`
You are hotel emergency AI.

Type: ${type}
Location: ${location}

Give 4 short steps:
1.
2.
3.
4.
`);

  document.getElementById("ai").innerHTML =
    "<b>AI Plan:</b><br>" + ai.replace(/\n/g,"<br>");
};

/* REALTIME */
onSnapshot(query(collection(db,"alerts"), orderBy("time","desc")), snap=>{
  data = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
  draw();
});

/* RENDER ALERTS */
function render(){
  const el = document.getElementById("alerts");
  el.innerHTML = data.map(d=>`
    <div class="alert">
      <b class="${d.type.toLowerCase()}">${d.type}</b><br>
      ${d.location}<br>
      ${d.message}<br>
      Status: ${d.status}<br>

      <button onclick="update('${d.id}','controlled')">Control</button>
      <button onclick="update('${d.id}','resolved')">Resolve</button>
    </div>
  `).join("");
}

/* UPDATE */
window.update = async function(id,status){
  await updateDoc(doc(db,"alerts",id),{status});
};

/* FLOOR MAP */
function draw(){
  const c = document.getElementById("map");
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,300,200);

  data.forEach(d=>{
    if(d.status==="resolved") return;

    ctx.fillStyle =
      d.type==="Fire"?"red":
      d.type==="Medical"?"blue":"orange";

    ctx.beginPath();
    ctx.arc(d.x,d.y,6,0,Math.PI*2);
    ctx.fill();
  });
}

setInterval(draw,2000);

</script>
</body>
</html>
