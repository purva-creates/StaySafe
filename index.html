<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StaySafe — Crisis Response AI</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --border: #ddd8d0; --text: #1a1a1a;
      --muted: #6b6860; --fire: #c0392b; --fire-bg: #fdf0ee;
      --medical: #1a6fb0; --medical-bg: #eef4fb;
      --security: #b58a00; --security-bg: #fdf8e8;
      --accent: #2c3e50; --resolved: #2d7a4f;
    }

    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); margin:0; }

    .topbar {
      background: var(--accent); color: white; padding: 10px 20px;
      display:flex; justify-content:space-between; align-items:center;
    }

    .mode-pill { padding:4px 10px; border-radius:20px; background:#555; }
    .mode-pill.active { background:red; }

    #staffInstructionBanner {
      display:none; background:yellow; padding:15px;
      font-weight:bold; text-align:center; font-size:18px;
    }

    .container { padding:20px; display:grid; grid-template-columns:350px 1fr; gap:20px; }

    .panel { background:white; padding:15px; border-radius:8px; }

    .form-input, .form-select {
      width:100%; padding:8px; margin-bottom:10px;
    }

    .sos-btn { padding:10px; border:none; color:white; cursor:pointer; }
    .fire{background:red;} .medical{background:blue;} .security{background:orange;}

    .alert-card { border:1px solid #ddd; margin-bottom:10px; padding:10px; border-radius:6px; }

    img { width:100%; margin-top:10px; border-radius:6px; }

  </style>
</head>

<body>

<div class="topbar">
  <div>StaySafe</div>
  <div>
    <span id="modePill" class="mode-pill">Guest</span>
    <button onclick="toggleStaff()">Switch</button>
  </div>
</div>

<div id="staffInstructionBanner">
  ⚠️ <span id="instructionText"></span>
</div>

<div class="container">

  <div class="panel">
    <h3>Report Emergency</h3>

    <select id="floorSelect" class="form-select">
      <option>G</option><option>1</option><option>2</option>
    </select>

    <input id="location" class="form-input" placeholder="Location">

    <select id="priority" class="form-select">
      <option>HIGH</option><option>MEDIUM</option><option>LOW</option>
    </select>

    <!-- 📸 PHOTO -->
    <input type="file" id="photoUpload" class="form-input">

    <button class="sos-btn fire" onclick="handleEmergency('Fire')">Fire</button>
    <button class="sos-btn medical" onclick="handleEmergency('Medical')">Medical</button>
    <button class="sos-btn security" onclick="handleEmergency('Security')">Security</button>
  </div>

  <div class="panel">
    <h3>Live Alerts</h3>
    <div id="alertList"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection, onSnapshot, doc, updateDoc, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBFqSj13pDUioDbRj-cfUPQg-YnSrn5bPw",
  authDomain: "staysafe-17243.firebaseapp.com",
  projectId: "staysafe-17243",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isStaff=false;
let dataCache=[];
let myReportId=null;

window.toggleStaff=()=>{
  isStaff=!isStaff;
  document.getElementById("modePill").innerText=isStaff?"Staff":"Guest";
};

function getBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.readAsDataURL(file);
    r.onload=()=>res(r.result);
  });
}

window.handleEmergency=async(type)=>{

  const loc=document.getElementById("location").value;
  const prio=document.getElementById("priority").value;
  const file=document.getElementById("photoUpload").files[0];

  if(!loc){ alert("Enter location"); return; }

  let imageUrl=null;
  if(file) imageUrl=await getBase64(file);

  const docRef=await addDoc(collection(db,"emergencies"),{
    type,location:loc,priority:prio,
    floor:document.getElementById("floorSelect").value,
    status:"ongoing",
    time:new Date().toISOString(),
    staffInstruction:"",
    imageUrl
  });

  myReportId=docRef.id;
  listenForBridge(myReportId);

  // 🚑 CALL
  if(type==="Fire") window.location.href="tel:101";
  if(type==="Medical") window.location.href="tel:108";
  if(type==="Security") window.location.href="tel:100";
};

function listenForBridge(id){
  onSnapshot(doc(db,"emergencies",id),(docSnap)=>{
    const d=docSnap.data();
    if(d && d.staffInstruction){
      document.getElementById("instructionText").innerText=d.staffInstruction;
      document.getElementById("staffInstructionBanner").style.display="block";
    }
  });
}

window.sendInstruction=async(id)=>{
  const val=prompt("Instruction:");
  if(!val) return;

  await updateDoc(doc(db,"emergencies",id),{
    staffInstruction:val
  });
};

function render(){
  const list=document.getElementById("alertList");

  list.innerHTML=dataCache.map(d=>`
    <div class="alert-card">
      <b>${d.type}</b><br>
      📍 ${d.location}<br>
      ⚠️ ${d.priority}<br>

      ${d.imageUrl ? `<img src="${d.imageUrl}">` : ""}

      ${isStaff ? `<button onclick="sendInstruction('${d.id}')">Send Instruction</button>` : ""}

    </div>
  `).join("");
}

const q=query(collection(db,"emergencies"),orderBy("time","desc"));

onSnapshot(q,snap=>{
  dataCache=[];
  snap.forEach(d=>dataCache.push({id:d.id,...d.data()}));
  render();
});

</script>

</body>
</html>
