<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StaySafe — Crisis Response AI</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --border: #ddd8d0; --text: #1a1a1a;
      --muted: #6b6860; --fire: #c0392b; --fire-bg: #fdf0ee;
      --medical: #1a6fb0; --medical-bg: #eef4fb;
      --security: #b58a00; --security-bg: #fdf8e8;
      --accent: #2c3e50; --resolved: #2d7a4f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); }

    /* --- TOP BAR --- */
    .topbar {
      background: var(--accent); color: white; padding: 0 24px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
    .topbar-logo span { color: #e74c3c; }
    
    .mode-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.12); color: #ccc; }
    .mode-pill.active { background: #e74c3c; color: white; }

    /* --- THE BRIDGE BANNER --- */
    #staffInstructionBanner {
      display: none; background: #ffeb3b; border: 3px solid #fbc02d;
      padding: 20px; font-weight: bold; color: #000; text-align: center;
      position: sticky; top: 52px; z-index: 99; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .two-col { display: grid; grid-template-columns: 380px 1fr; gap: 24px; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); display: flex; justify-content: space-between; }
    .panel-body { padding: 18px; }

    .form-field { margin-bottom: 14px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
    .form-input, .form-select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: #fafafa; }

    .sos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .sos-btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; transition: 0.1s; }
    .sos-btn:active { transform: scale(0.95); }
    .sos-btn.fire { background: var(--fire); }
    .sos-btn.medical { background: var(--medical); }
    .sos-btn.security { background: var(--security); }

    /* --- ALERTS --- */
    .alert-card { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; background: white; }
    .alert-card-header { padding: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .alert-card-header.fire { border-left: 6px solid var(--fire); background: var(--fire-bg); }
    .alert-card-header.medical { border-left: 6px solid var(--medical); background: var(--medical-bg); }
    .alert-card-header.security { border-left: 6px solid var(--security); background: var(--security-bg); }

    .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    .status-ongoing { background: #fee2e2; color: #b91c1c; }
    .status-resolved { background: #dcfce7; color: #15803d; }

    .action-row { display: flex; gap: 8px; padding: 12px; background: #fafafa; border-top: 1px solid var(--border); }
    .btn-small { padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; background: white; }

    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Stay<span>Safe</span></div>
  <div style="display:flex; align-items:center; gap:15px;">
    <div class="mode-pill" id="modePill">Guest Mode</div>
    <button class="btn-small" style="background:transparent; color:white; border-color:rgba(255,255,255,0.3);" onclick="toggleStaff()">Switch Mode</button>
  </div>
</div>

<div id="staffInstructionBanner">
  ⚠️ EMERGENCY INSTRUCTION: <span id="instructionText">Awaiting updates...</span>
</div>

<div class="container">
  <div class="two-col">
    <div id="reportingSide">
      <div class="panel">
        <div class="panel-header">Create Emergency Report</div>
        <div class="panel-body">
          <div class="form-field">
            <label class="form-label">Location (Floor & Room)</label>
            <div style="display:grid; grid-template-columns: 80px 1fr; gap:10px;">
              <select class="form-select" id="floorSelect">
                <option value="G">G</option><option value="1">1</option><option value="2">2</option><option value="3">3</option>
              </select>
              <input class="form-input" id="location" placeholder="e.g. Room 204 or Lobby">
            </div>
          </div>

          <div class="form-field">
            <label class="form-label">Priority Level</label>
            <select class="form-select" id="priority">
              <option value="HIGH">High (Life Threatening)</option>
              <option value="MEDIUM">Medium</option>
              <option value="LOW">Low</option>
            </select>
          </div>

          <div class="form-field">
            <label class="form-label">Evidence (Take Photo)</label>
            <input type="file" id="photoUpload" accept="image/*" capture="environment" class="form-input">
          </div>

          <div class="sos-grid">
            <button class="sos-btn fire" onclick="handleEmergency('Fire')">🔥 Fire</button>
            <button class="sos-btn medical" onclick="handleEmergency('Medical')">🚑 Medical</button>
            <button class="sos-btn security" onclick="handleEmergency('Security')">🛡️ Security</button>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="panel">
        <div class="panel-header">
          Active Incidents 
          <span id="incidentCount" style="background:red; color:white; padding:2px 8px; border-radius:10px; font-size:10px;">0</span>
        </div>
        <div class="panel-body" id="alertList">
          </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, addDoc, collection, onSnapshot, doc, updateDoc, query, orderBy } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // --- 1. CONFIG (PASTE YOUR ACTUAL FIREBASE KEYS HERE) ---
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- 2. GLOBAL STATE ---
  let isStaff = false;
  let dataCache = [];
  let myReportId = null;

  // --- 3. CORE LOGIC ---

  window.toggleStaff = () => {
    isStaff = !isStaff;
    const pill = document.getElementById('modePill');
    pill.textContent = isStaff ? "Staff Mode" : "Guest Mode";
    pill.className = "mode-pill" + (isStaff ? " active" : "");
    render();
  };

  window.handleEmergency = async (type) => {
    const locName = document.getElementById('location').value;
    const prio = document.getElementById('priority').value;
    
    if (!locName) return alert("Please enter a location");

    try {
      const docRef = await addDoc(collection(db, "emergencies"), {
        type,
        location: locName,
        priority: prio,
        floor: document.getElementById('floorSelect').value,
        status: "ongoing",
        time: new Date().toISOString(),
        staffInstruction: "" // The Bridge field
      });

      myReportId = docRef.id;
      alert("Report sent. Watch the top of your screen for staff instructions.");
      document.getElementById('location').value = "";
      
      // Start listening for instructions for THIS specific guest
      listenForBridge(myReportId);
    } catch (e) { alert("Error: " + e.message); }
  };

  function listenForBridge(id) {
    onSnapshot(doc(db, "emergencies", id), (doc) => {
      const data = doc.data();
      const banner = document.getElementById('staffInstructionBanner');
      const text = document.getElementById('instructionText');
      
      if (data && data.staffInstruction) {
        text.textContent = data.staffInstruction;
        banner.style.display = 'block';
        window.scrollTo({top: 0, behavior: 'smooth'});
      }
    });
  }

  window.sendInstruction = async (id) => {
    const input = document.getElementById(`ins_${id}`);
    if (!input.value) return alert("Type a message first");

    await updateDoc(doc(db, "emergencies", id), {
      staffInstruction: input.value
    });
    alert("Safety instruction sent to Guest.");
    input.value = "";
  };

  window.updateStatus = async (id, status) => {
    await updateDoc(doc(db, "emergencies", id), { status });
  };

  // --- 4. UI RENDERING ---

  function render() {
    const list = document.getElementById('alertList');
    if (dataCache.length === 0) {
      list.innerHTML = `<p style="text-align:center; color:grey; padding:40px;">System standby. No active reports.</p>`;
      return;
    }

    list.innerHTML = dataCache.map(d => {
      const statusClass = d.status === 'resolved' ? 'status-resolved' : 'status-ongoing';
      const typeClass = d.type.toLowerCase();
      
      return `
        <div class="alert-card">
          <div class="alert-card-header ${typeClass}">
            <strong>${d.type.toUpperCase()}</strong>
            <span class="status-badge ${statusClass}">${d.status}</span>
          </div>
          <div class="panel-body">
            <p>📍 <strong>Location:</strong> Floor ${d.floor}, ${d.location}</p>
            <p>⚠️ <strong>Priority:</strong> ${d.priority}</p>
            
            ${isStaff && d.status !== 'resolved' ? `
              <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                <label class="form-label" style="font-size:10px;">Send Instruction to Guest:</label>
                <input type="text" id="ins_${d.id}" placeholder="e.g. Move to Level 1 lobby" class="form-input">
                <button class="btn-small" style="width:100%; margin-top:5px; background:var(--accent); color:white;" 
                  onclick="sendInstruction('${d.id}')">📢 Broadcast to Guest</button>
              </div>
            ` : ""}
          </div>
          <div class="action-row">
            ${isStaff && d.status !== 'resolved' ? `
              <button class="btn-small" onclick="updateStatus('${d.id}', 'resolved')">✅ Mark Resolved</button>
            ` : ""}
            ${!isStaff ? `<button class="btn-small" onclick="alert('Confirmed')">👍 I see this too</button>` : ""}
          </div>
        </div>
      `;
    }).join("");
  }

  // --- 5. DATA SYNC ---
  const q = query(collection(db, "emergencies"), orderBy("time", "desc"));
  onSnapshot(q, snap => {
    dataCache = [];
    snap.forEach(d => dataCache.push({ id: d.id, ...d.data() }));
    document.getElementById('incidentCount').textContent = dataCache.filter(x => x.status !== 'resolved').length;
    render();
  });
</script>
</body>
</html>
};

</script>
</body>
</html>
